spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/youflow
    username: youflow
    password: youflow
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

youflow:
  jwt:
    secret: youflow-secret-key-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000
  youtube:
    api-key: ${YOUTUBE_API_KEY:placeholder}

server:
  port: 8080
