debug: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/youflow
    username: youflow
    password: youflow
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

youflow:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

youtube:
  api-key: ${YOUTUBE_API_KEY}

server:
  port: 8080
